
# Catch-all request/response body logger. Declared here (not inline) so it runs
# before the file-based `proxy` edge function and wraps every interaction.
# Active only when MCP_VERBOSE_LOGGING is set.
[[edge_functions]]
  function = "request-logger"
  path = "/*"

[[edge_functions]]
  function = "proxy"
  path = "/proxy/:token/*"

[[redirects]]
  from = "/mcp/*"
  to = ".netlify/functions/mcp/:splat"
  status = 200

[[redirects]]
  from = "/oauth-server/*"
  to = ".netlify/functions/oauth-server/:splat"
  status = 200

# just in case some client assumes these common defaults
[[redirects]]
  from = "/token"
  to = ".netlify/functions/oauth-server/token"
  status = 200
[[redirects]]
  from = "/authorize"
  to = ".netlify/functions/oauth-server/auth"
  status = 200
[[redirects]]
  from = "/register"
  to = ".netlify/functions/oauth-server/register"
  status = 200

[[redirects]]
  from = "/.well-known/oauth-protected-resource"
  to = ".netlify/functions/oauth-server/.well-known/oauth-protected-resource"
  status = 200
# RFC 9728 path-based PRM: clients request this for a resource at /mcp.
[[redirects]]
  from = "/.well-known/oauth-protected-resource/*"
  to = ".netlify/functions/oauth-server/.well-known/oauth-protected-resource"
  status = 200
[[redirects]]
  from = "/.well-known/oauth-authorization-server"
  to = ".netlify/functions/oauth-server/.well-known/oauth-authorization-server"
  status = 200
[[redirects]]
  from = "/.well-known/openid-configuration"
  to = ".netlify/functions/oauth-server/openid-configuration"
  status = 200
